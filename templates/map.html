<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map - {{ scene_name }}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
<nav class="bg-slate-800 p-4 shadow-lg mb-8">
<div class="container mx-auto flex justify-between items-center">
<h1 class="text-xl font-bold tracking-tight">Kasa Basement Bridge</h1>
<div class="flex gap-4">
<a href="/scenes" class="text-slate-400 hover:text-white transition-colors">Scenes</a>
<a href="/" class="text-slate-400 hover:text-white transition-colors">Dashboard</a>
</div>
</div>
</nav>

<main class="container mx-auto px-4 max-w-5xl">
    <div class="flex items-start justify-between gap-6 mb-6">
        <div>
            <h2 class="text-3xl font-bold">Map</h2>
            <p class="text-slate-400 mt-1">
                Scene: <span class="font-mono">{{ scene_name }}</span>
            </p>
        </div>
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4">
            <div class="text-sm text-slate-300 mb-2">Render mode</div>
            <label class="flex items-center gap-2 text-sm">
                <input type="radio" name="renderMode" value="max" checked onchange="setRenderMode(this.value)">
                Max brightness
            </label>
            <label class="flex items-center gap-2 text-sm mt-1">
                <input type="radio" name="renderMode" value="current" onchange="setRenderMode(this.value)">
                Current brightness
            </label>
        </div>
    </div>

    <div class="grid grid-cols-8 gap-2 bg-slate-800/50 border border-slate-700 rounded-2xl p-4">
        {% for i in range(64) %}
        <button class="aspect-square rounded-lg border border-slate-700 bg-slate-900 hover:bg-slate-800 transition-colors relative"
                onclick="openCell({{ i }})"
                id="cell-{{ i }}"
                type="button">
            <span class="absolute top-1 left-1 text-[10px] text-slate-500">{{ i }}</span>
        </button>
        {% endfor %}
    </div>

    <div class="mt-6 text-sm text-slate-400">
        Click a tile to add/edit/remove a device action. This map is saved automatically.
    </div>
</main>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4">
    <div class="w-full max-w-xl bg-slate-900 border border-slate-700 rounded-2xl p-6">
        <div class="flex items-start justify-between gap-4 mb-4">
            <div>
                <h3 class="text-xl font-semibold">Tile <span id="modalIdx" class="font-mono"></span></h3>
                <p id="modalSub" class="text-sm text-slate-400 mt-1"></p>
            </div>
            <button class="text-slate-400 hover:text-white" onclick="closeModal()">Close</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Device</label>
                <select id="deviceAlias" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm">
                    <option value="">Select…</option>
                </select>
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-1">Action</label>
                <select id="deviceAction" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm" onchange="refreshModalBulbControls()">
                    <option value="on">On</option>
                    <option value="off">Off</option>
                    <option value="toggle">Toggle</option>
                </select>
            </div>

            <div id="bulbControls" class="space-y-3">
                <div class="flex items-center gap-3">
                    <label class="text-sm text-slate-400 w-24">Brightness</label>
                    <input id="brightness" type="range" min="0" max="100" value="100" class="flex-1" oninput="document.getElementById('brightnessNum').value=this.value">
                    <input id="brightnessNum" type="number" min="0" max="100" value="100" class="w-20 bg-slate-800 border border-slate-700 rounded-lg p-1 text-sm" oninput="document.getElementById('brightness').value=this.value">
                </div>
                <div class="flex items-center gap-3">
                    <label class="text-sm text-slate-400 w-24">Color</label>
                    <input id="colorPicker" type="color" value="#ffffff" class="h-10 w-14 bg-slate-800 border border-slate-700 rounded-lg p-1"
                           onchange="document.getElementById('colorText').value=this.value">
                    <input id="colorText" type="text" value="#ffffff" class="w-28 bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm font-mono"
                           onchange="if(/^#[0-9A-Fa-f]{6}$/.test(this.value)){document.getElementById('colorPicker').value=this.value}">
                    <div class="ml-auto flex items-center gap-2">
                        <div class="w-10 h-10 rounded border border-slate-600" title="Full brightness color" id="previewFull"></div>
                        <div class="w-10 h-10 rounded border border-slate-600" title="Brightness-applied color" id="previewCurrent"></div>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 pt-2">
                <button class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition-colors text-sm" onclick="saveCell()">
                    Save
                </button>
                <button class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded-lg transition-colors text-sm" onclick="removeCell()">
                    Remove
                </button>
            </div>
        </div>
    </div>
</div>

<script type="application/json" id="devicesJs">{{ devices_js | tojson }}</script>
<script type="application/json" id="gridJs">{{ grid_js | tojson }}</script>

<script>
    const sceneIdx = {{ scene_idx }};
    const devices = JSON.parse(document.getElementById('devicesJs').textContent);
    let grid = JSON.parse(document.getElementById('gridJs').textContent); // 64 cells
    let renderMode = 'max'; // 'max' | 'current'
    let activeIdx = null;

    function hexApplyBrightness(hexColor, brightness) {
        const c = String(hexColor || '').replace('#', '');
        if (!/^[0-9A-Fa-f]{6}$/.test(c)) return '#000000';
        const r = parseInt(c.slice(0,2), 16);
        const g = parseInt(c.slice(2,4), 16);
        const b = parseInt(c.slice(4,6), 16);
        const br = Math.max(0, Math.min(100, parseInt(brightness || '100', 10))) / 100.0;
        const r2 = Math.floor(r * br);
        const g2 = Math.floor(g * br);
        const b2 = Math.floor(b * br);
        return `#${r2.toString(16).padStart(2,'0')}${g2.toString(16).padStart(2,'0')}${b2.toString(16).padStart(2,'0')}`;
    }

    function cellDisplayColor(cell) {
        if (!cell) return { bg: null, text: null };
        if (cell.action === 'off') return { bg: '#0b1220', text: 'OFF' };
        const params = cell.params || {};
        const color = params.color || '#ffffff';
        const brightness = (typeof params.brightness === 'number') ? params.brightness : 100;
        const bg = (renderMode === 'current') ? hexApplyBrightness(color, brightness) : color;
        return { bg, text: cell.device_alias || '' };
    }

    function renderGrid() {
        for (let i = 0; i < 64; i++) {
            const el = document.getElementById(`cell-${i}`);
            const cell = grid[i] || null;
            const disp = cellDisplayColor(cell);
            if (!cell) {
                el.style.backgroundColor = '';
                el.title = 'Empty';
                continue;
            }
            el.style.backgroundColor = disp.bg || '';
            el.title = `${cell.device_alias} / ${cell.action}`;
        }
    }

    async function persistGrid() {
        await fetch(`/api/scenes/${sceneIdx}/map`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ grid })
        });
    }

    function setRenderMode(mode) {
        renderMode = mode;
        renderGrid();
    }

    function deviceType(alias) {
        const d = devices.find(x => x.alias === alias);
        return d ? String(d.type || '').toLowerCase() : '';
    }

    function refreshModalBulbControls() {
        const alias = document.getElementById('deviceAlias').value;
        const action = document.getElementById('deviceAction').value;
        const isBulb = deviceType(alias) === 'bulb';
        const show = isBulb && action === 'on';
        document.getElementById('bulbControls').style.display = show ? 'block' : 'none';
        refreshModalPreviews();
    }

    function refreshModalPreviews() {
        const color = document.getElementById('colorText').value || '#ffffff';
        const b = document.getElementById('brightnessNum').value || '100';
        document.getElementById('previewFull').style.backgroundColor = color;
        document.getElementById('previewCurrent').style.backgroundColor = hexApplyBrightness(color, b);
    }

    function openCell(idx) {
        activeIdx = idx;
        document.getElementById('modalIdx').textContent = idx;
        const cell = grid[idx] || null;
        document.getElementById('modalSub').textContent = cell ? `${cell.device_alias} / ${cell.action}` : 'Empty';

        // Populate device list
        const sel = document.getElementById('deviceAlias');
        sel.innerHTML = '<option value="">Select…</option>' + devices.map(d => `<option value="${d.alias}">${d.alias} (${d.type})</option>`).join('');

        if (cell) {
            sel.value = cell.device_alias || '';
            document.getElementById('deviceAction').value = cell.action || 'on';
            const params = cell.params || {};
            const br = (typeof params.brightness === 'number') ? params.brightness : 100;
            document.getElementById('brightness').value = br;
            document.getElementById('brightnessNum').value = br;
            const c = params.color || '#ffffff';
            document.getElementById('colorPicker').value = c;
            document.getElementById('colorText').value = c;
        } else {
            sel.value = '';
            document.getElementById('deviceAction').value = 'on';
            document.getElementById('brightness').value = 100;
            document.getElementById('brightnessNum').value = 100;
            document.getElementById('colorPicker').value = '#ffffff';
            document.getElementById('colorText').value = '#ffffff';
        }

        // Wire preview updates
        document.getElementById('brightness').oninput = function() {
            document.getElementById('brightnessNum').value = this.value;
            refreshModalPreviews();
        };
        document.getElementById('brightnessNum').oninput = function() {
            document.getElementById('brightness').value = this.value;
            refreshModalPreviews();
        };
        document.getElementById('colorPicker').onchange = function() {
            document.getElementById('colorText').value = this.value;
            refreshModalPreviews();
        };
        document.getElementById('colorText').oninput = function() {
            if (/^#[0-9A-Fa-f]{6}$/.test(this.value)) {
                document.getElementById('colorPicker').value = this.value;
                refreshModalPreviews();
            }
        };

        document.getElementById('modal').classList.remove('hidden');
        refreshModalBulbControls();
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        activeIdx = null;
    }

    async function saveCell() {
        if (activeIdx === null) return;
        const alias = document.getElementById('deviceAlias').value;
        if (!alias) return;
        const action = document.getElementById('deviceAction').value;
        const cell = { device_alias: alias, action: action, params: null };

        const isBulb = deviceType(alias) === 'bulb';
        if (isBulb && action === 'on') {
            const br = parseInt(document.getElementById('brightnessNum').value || '100', 10);
            const color = document.getElementById('colorText').value || '#ffffff';
            cell.params = {
                brightness: Math.max(0, Math.min(100, br)),
                color: color
            };
        }

        grid[activeIdx] = cell;
        renderGrid();
        await persistGrid();
        closeModal();
    }

    async function removeCell() {
        if (activeIdx === null) return;
        grid[activeIdx] = null;
        renderGrid();
        await persistGrid();
        closeModal();
    }

    renderGrid();
</script>
</body>
</html>
